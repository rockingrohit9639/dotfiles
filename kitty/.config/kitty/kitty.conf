# BEGIN_KITTY_THEME
# Chalk
include current-theme.conf

# END_KITTY_THEME

# Font
font_size               14.0
font_family             "Monaspace Krypton"
bold_font               auto
italic_font             auto
bold_italic_font        auto
modify_font             cell_height 120%

# Cursor
cursor                  #cccccc
cursor_shape            block
cursor_blink_interval   0

# Background — macos_traditional_fullscreen preserves compositing/transparency
background_opacity      0.90
background_blur         20
macos_traditional_fullscreen yes

# Window
window_padding_width    8
hide_window_decorations titlebar-only
macos_titlebar_color    background
active_border_color     #cccccc
inactive_border_color   #444444
draw_minimal_borders    no

# Tab bar
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      " {index}: {title} "

# Scrollback
scrollback_lines        10000

# Bell
enable_audio_bell       no
visual_bell_duration    0.0

# Performance
repaint_delay           8
input_delay             2
sync_to_monitor         yes

# Layouts
enabled_layouts         splits,grid,tall,fat,stack

# Window splits
map f5                  launch --location=hsplit
map cmd+shift+h         launch --location=hsplit
map cmd+shift+v         launch --location=vsplit
map cmd+shift+w         close_window

# Navigate splits (vim-style)
map cmd+shift+j         neighboring_window down
map cmd+shift+k         neighboring_window up
map cmd+shift+l         neighboring_window left
map cmd+shift+semicolon neighboring_window right

# Resize splits
map cmd+ctrl+h          resize_window narrower 3
map cmd+ctrl+l          resize_window wider 3
map cmd+ctrl+k          resize_window taller 3
map cmd+ctrl+j          resize_window shorter 3

# Layout switching
map ctrl+shift+space    next_layout
